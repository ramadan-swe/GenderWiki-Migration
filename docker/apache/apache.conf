<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html
    DirectoryIndex /mw/index.php

    Alias /mw /var/www/html/mw
    Alias /r /srv/repositorea/genderiyya.xyz

    <Directory /var/www/html>
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /srv/repositorea/genderiyya.xyz>
        AllowOverride All
        Require all granted
    </Directory>

    # Serve MediaWiki article URLs directly under /wiki/ by proxying them
    # to the front controller with PATH_INFO.
    ProxyPassMatch "^/wiki/(.*)$" "fcgi://php-fpm:9000/var/www/html/mw/index.php/$1"

    # Serve the MediaWiki front controller and assets under /mw.
    ProxyPassMatch "^/mw/(.*\.php(/.*)?)$" "fcgi://php-fpm:9000/var/www/html/mw/$1"
    ProxyPassMatch "^/(index\.php(/.*)?)$" "fcgi://php-fpm:9000/var/www/html/mw/$1"

    # Pass PHP scripts to the php-fpm container over TCP. Map the
    # requested URI to the filesystem path under /var/www/html/mw.
    ProxyPassMatch "^/(.*\.php(/.*)?)$" "fcgi://php-fpm:9000/var/www/html/mw/$1"

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
